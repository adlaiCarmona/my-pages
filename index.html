<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pages</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: #0f0f11;
        color: #e8e8f0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
        color: #fff;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 48px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
        width: 100%;
        max-width: 720px;
      }

      .card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #18181c;
        border: 1px solid #2a2a30;
        border-radius: 12px;
        padding: 24px 20px;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
      }

      .card:hover {
        border-color: #5b5bf6;
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(91, 91, 246, 0.15);
      }

      .card-icon {
        font-size: 1.6rem;
        line-height: 1;
      }

      .card-name {
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
      }

      .card-arrow {
        margin-top: auto;
        font-size: 0.8rem;
        color: #5b5bf6;
        letter-spacing: 0.5px;
      }

      footer {
        margin-top: 60px;
        font-size: 0.75rem;
        color: #444;
      }
    </style>
  </head>
  <body>
    <h1>Pages</h1>
    <p class="subtitle">Select a project</p>

    <div class="grid">
      <a class="card" href="common/">
      <span class="card-icon">📁</span>
      <span class="card-name">common</span>
      <span class="card-arrow">Open →</span>
    </a>    <a class="card" href="futbol-libre/">
      <span class="card-icon">📁</span>
      <span class="card-name">futbol-libre</span>
      <span class="card-arrow">Open →</span>
    </a>    <a class="card" href="one-piece-tcg-decks/">
      <span class="card-icon">📁</span>
      <span class="card-name">one-piece-tcg-decks</span>
      <span class="card-arrow">Open →</span>
    </a>    <a class="card" href="one-piece-tcg/">
      <span class="card-icon">📁</span>
      <span class="card-name">one-piece-tcg</span>
      <span class="card-arrow">Open →</span>
    </a>
    </div>

    <footer>my-pages</footer>
  </body>
</html>

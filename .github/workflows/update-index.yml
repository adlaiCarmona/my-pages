name: Update Index

on:
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate index.html
        run: |
          # Collect subdirectories, excluding hidden ones
          dirs=()
          for d in */; do
            name="${d%/}"
            dirs+=("$name")
          done

          # Build card elements to replace the <!-- CARDS --> placeholder
          cards=""
          for name in "${dirs[@]}"; do
            cards+="    <a class=\"card\" href=\"${name}/\">\n"
            cards+="      <span class=\"card-icon\">📁</span>\n"
            cards+="      <span class=\"card-name\">${name}<\/span>\n"
            cards+="      <span class=\"card-arrow\">Open →<\/span>\n"
            cards+="    <\/a>"
          done

          sed "s|    <!-- CARDS -->|${cards}|" index.template.html > index.html

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update index.html with current subdirectories"
          git push
